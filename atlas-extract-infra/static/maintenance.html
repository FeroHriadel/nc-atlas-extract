<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Extract — Offline</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            text-align: center;
            padding: 3rem 2rem;
            border: 1px solid #1e293b;
            border-radius: 12px;
            max-width: 420px;
            width: 100%;
        }

        .status {
            display: inline-block;
            background: #1e293b;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="status">Offline</span>
        <h1>The service is asleep</h1>
        <p>Sorry &mdash; the server is currently offline.<br>Ping the admin to wake it up.</p>
    </div>
</body>
</html>
