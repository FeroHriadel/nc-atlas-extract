<app-container>
    <nc-card class="p-4 mb-6">
        <h1 class="page-title text-left">Extractions List</h1>
        <p class="page-subtitle text-left">List of extractions made from Sources.</p>
    </nc-card>

    <nc-card class="p-4">
        <h2 class="section-title-light mb-4">Extractions Table</h2>
        <nc-virtualized-table
            [data]="(tableData$ | async) ?? []"
            [columnsConfig]="columnsConfig"
            [controls]="true"
        />
    </nc-card>
</app-container>

<ng-template #statusCell let-row="row">
    <nc-pill size="small" [style]="statusStyles[row.status] || statusStyles['pending']">
        {{ row.status }}
    </nc-pill>
</ng-template>

<ng-template #viewDataCell let-row="row">
    <div class="flex items-center gap-1">
        @if (row.status === 'completed') {
            <a [routerLink]="['/extraction-details', row.id]">
                <nc-button size="small">Details</nc-button>
            </a>
        }
        @if (row.status === 'completed' || row.status === 'failed') {
            <nc-button size="small" variant="red" (click)="onDeleteExtraction(row.id)">Delete</nc-button>
        }
    </div>
</ng-template>
