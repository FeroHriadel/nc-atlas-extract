<!-- top-nav -->
<nc-topnav
  [links]="navLinks"
  [style]="{top: '1rem', left: '1rem', width: 'calc(100% - 2rem)', border: '1px solid var(--nc-border-color)'}"
  class="topnav"
>
  <div slot="logo" class="flex gap-1 flex-center">
    <a routerLink="/" class="pointer flex flex-center gap-4">
      <img [src]="logoUrl" alt="Logo" class="logo" />
    </a>
  </div>

  <span slot="custom" class="mr-2">
    <nc-square-button (click)="toggleTheme()">
      <nc-pallete-icon></nc-pallete-icon>
    </nc-square-button>
  </span>
</nc-topnav>

<!-- sidebar -->
<nc-card class="sidebar p-4">
  <ul class="mb-8">
    <li>
      <a class="block" routerLink="/sources/upload" [style]="{width: '100%'}">
        <nc-button variant="outline" class="w-100 mb-1">Upload Source</nc-button>
      </a>
    </li>
    <li>
      <a class="block" routerLink="/sources" [style]="{width: '100%'}">
        <nc-button variant="outline" class="w-100 mb-1">Source List</nc-button>
      </a>
    </li>
    <li>
      <a class="block" routerLink="/extract-data" [style]="{width: '100%'}">
        <nc-button variant="outline" class="w-100 mb-1">Extract Data</nc-button>
      </a>
    </li>
    <li>
      <a class="block" routerLink="/extractions" [style]="{width: '100%'}">
        <nc-button variant="outline" class="w-100 mb-1">Extractions</nc-button>
      </a>
    </li>
    <li>
      <a class="block" routerLink="/data-prep" [style]="{width: '100%'}">
        <nc-button variant="outline" class="w-100 mb-1">Enrich Data</nc-button>
      </a>
    </li>
    <li>
      <a class="block" routerLink="/help" [style]="{width: '100%'}">
        <nc-button variant="dark" class="w-100 mb-1">Help</nc-button>
      </a>
    </li>
    <li>
      <nc-button variant="red" class="w-100" (click)="signOut()">Sign Out</nc-button>
    </li>
  </ul>
</nc-card>

<!-- main content -->
<div class="app-wrap">
  @if (isLoadingPage()) {
    <app-page-loader />
  } @else {
    <router-outlet></router-outlet>
  }
</div>
