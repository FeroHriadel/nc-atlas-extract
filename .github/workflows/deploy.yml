name: Deploy

on:
  push:
    branches: [master]

permissions:
  id-token: write   # required for OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: atlas-extract-client/package-lock.json

      - name: Install FE dependencies
        working-directory: atlas-extract-client
        run: npm ci

      - name: Build Angular (production)
        working-directory: atlas-extract-client
        run: npx ng build --configuration production

      - name: Copy FE into BE wwwroot
        run: |
          mkdir -p atlas-extract-server/wwwroot
          cp -r atlas-extract-client/dist/atlas-extract-client/browser/. atlas-extract-server/wwwroot/

      # ── Backend ───────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish BE (self-contained linux-x64)
        working-directory: atlas-extract-server
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -o ../publish

      # ── Package ───────────────────────────────────────────────────────────
      - name: Create artifact tarball
        run: tar -czf artifact.tar.gz -C publish .

      # ── AWS auth ──────────────────────────────────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload artifact to S3
        run: aws s3 cp artifact.tar.gz s3://${{ secrets.AWS_ARTIFACT_BUCKET }}/artifact.tar.gz

      # ── Deploy via SSM ────────────────────────────────────────────────────
      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
          BUCKET: ${{ secrets.AWS_ARTIFACT_BUCKET }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n --arg b "$BUCKET" '{commands: [
              "set -e",
              ("aws s3 cp s3://" + $b + "/artifact.tar.gz /tmp/artifact.tar.gz"),
              "systemctl stop atlas-extract || true",
              "rm -rf /opt/atlas-extract/*",
              "tar -xzf /tmp/artifact.tar.gz -C /opt/atlas-extract/",
              "chmod +x /opt/atlas-extract/atlas-extract-server",
              "systemctl start atlas-extract",
              "rm /tmp/artifact.tar.gz"
            ]}')" \
            --region eu-central-1 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region eu-central-1 \
            --cli-read-timeout 300

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region eu-central-1 \
            --query "Status" \
            --output text)

          echo "Deployment status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
